<!-- src/templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project: Todo List</title>
<script defer src="main.js"></script></head>
<body>
  <div id="main-container">
    <div id="sidebar">
      <div class="sidebar-header">
        <h2>Projects</h2>
        <button id="addProjectBtn" class="add-project">+ New Project</button>
      </div>
      
      <div class="period">
        
        <button id="period-all" class="period-btn active">All</button>
        <button id="period-today" class="period-btn">Today</button>
        <button id="period-week" class="period-btn">This Week</button>
      </div>
      
      <div id="project-list" class="project-list"></div>
    </div>
    
    <div id="main-content">
      <div class="main-header" id="mainHeader">
        <div id="logo"></div>
        <h3>Todo List</h3>
        <button id="addTodoBtn" class="add-todo">+ New Task</button>
      </div>
      <div class="container-Todo"></div>
    </div>

      <!---------------------------- Project Modal ------------------------------------>
  <div id="project-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2 id="project-modal-title">New Project</h2>
      <form id="project-form">
        <div class="form-group">
          <label for="project-name">Project Name:</label>
          <input type="text" id="project-name" required>
        </div>
        <div class="form-group">
          <label for="project-description">Description:</label>
          <textarea id="project-description"></textarea>
        </div>
        <button type="submit" class="save-btn">Save Project</button>
      </form>
    </div>
  </div>
  
  <!-------------------------Todo modal ------------------- -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2 id="modal-title">New Task</h2>
      <form id="form">
        <div class="form-group">
          <label for="title">Title:</label>
          <input type="text" id="title" required>
        </div>
        <div class="form-group">
          <label for="description">Description:</label>
          <textarea id="description"></textarea>
        </div>
        <div class="form-group">
          <label for="due-date">Due Date:</label>
          <input type="date" id="due-date" required>
        </div>
        <div class="form-group">
          <label for="priority">Priority:</label>
          <select id="priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="notes">Notes:</label>
          <textarea id="notes"></textarea>
        </div>
        <div class="form-group">
          <label for="project">Project:</label>
          <select id="project"></select>
        </div>
        <button type="submit" class="save-btn">Save Task</button>
      </form>
    </div>
  </div>
  </div>
</body>
</html>
